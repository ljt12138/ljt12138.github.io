<!-- ============================================================
     EDITORIAL SERIF theme  (in-place reskin over academicpages)
     Self-contained: delete from here through the closing </style>
     to revert to the stock theme. Content/markup untouched.
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#fbfaf6;        /* warm off-white background */
    --ink:#1d1b17;          /* near-black warm text     */
    --muted:#6f695f;        /* meta / secondary text    */
    --faint:#e8e2d6;        /* hairline rules           */
    --accent:#8a2f2a;       /* oxblood                  */
    --accent-2:#b5564f;
    --serif:"Newsreader", Georgia, "Times New Roman", serif;
    --mono:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  /* ---------- base ---------- */
  html, body { background: var(--paper); }
  body{
    font-family: var(--serif);
    color: var(--ink);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .page__content{ font-size: 1.05em; }
  .page__content p, .page__content li{ line-height: 1.72; }

  a, a:visited{ color: var(--accent); text-decoration: none; }
  a:hover{ color: var(--accent-2); text-decoration: underline; text-underline-offset: 2px; }

  /* ---------- headings ---------- */
  h1, h2, h3, h4,
  .page__title, .archive__item-title{
    font-family: var(--serif);
    font-weight: 600;
    letter-spacing: -0.012em;
    line-height: 1.18;
    color: var(--ink);
  }
  .page__title{ font-size: 2.15rem; }
  .page__content h2{ font-size: 1.5rem; margin-top: 1.7em; }
  .page__content h3{ font-size: 1.2rem; }

  /* ---------- masthead / nav ---------- */
  .masthead{ background: var(--paper); border-bottom: 1px solid var(--faint); }
  .masthead__inner-wrap{ padding-top: .85em; padding-bottom: .85em; }
  .site-title{
    font-family: var(--serif);
    font-weight: 600;
    font-size: 1.35em;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .site-subtitle{ font-family: var(--mono); color: var(--muted); }
  .greedy-nav{ background: transparent; }
  .greedy-nav a{
    font-family: var(--mono);
    font-size: .78em;
    letter-spacing: .02em;
    color: var(--muted);
  }
  .greedy-nav a:hover{ color: var(--accent); text-decoration: none; }
  .greedy-nav .visible-links a::before{ background: var(--accent); height: 2px; }
  .greedy-nav__toggle{ color: var(--ink); }
  .greedy-nav .hidden-links{ background: var(--paper); border: 1px solid var(--faint); }
  .greedy-nav .hidden-links a{ color: var(--muted); }

  /* ---------- author sidebar (refined, not stock) ---------- */
  .author__avatar img{
    border: 1px solid var(--faint);
    border-radius: 10px;          /* soften the stock circle */
    max-width: 165px;
  }
  .author__name{ font-family: var(--serif); font-weight: 600; font-size: 1.45em; }
  .author__bio{ font-family: var(--serif); font-style: italic; color: var(--muted); }
  .author__urls-wrapper button{ font-family: var(--mono); font-size: .8em; }
  /* contact block — location, employer, and every link share one font + size.
     Size is set once on the <ul>; items use 1em so nothing compounds. */
  .author__urls{ font-size: .82em; }
  .author__urls li,
  .author__urls li a{ font-family: var(--mono); font-size: 1em; color: var(--ink); }
  .author__urls a:hover{ color: var(--accent); text-decoration: none; }
  /* Lay every row out as a flex line so the icon is vertically centered on the
     text. Font Awesome and Academicons glyphs have different vertical metrics,
     so an inline icon sits at the baseline and looks off; centering fixes both
     icon families. Same margin/padding on link rows and plain location/employer
     rows keeps the whole column aligned. */
  .author__urls li.author__desktop,
  .author__urls li a{ display: flex; align-items: center; margin-bottom: 5px; padding: 2px 5px 2px 0; }
  /* Each icon sits in an equal fixed-width box, glyph centered, with the gap to
     the label owned here (padding:0 neutralizes the .icon-pad-right utility so it
     can't add an inconsistent extra gap). Centering puts every glyph's optical
     center on one vertical axis — narrow glyphs (the location pin) included. */
  .author__urls li .fa,
  .author__urls li .fas,
  .author__urls li .fab,
  .author__urls li .ai{
    flex: none;
    width: 1.25em;
    padding: 0;
    margin-right: .6em;
    text-align: center;
  }
  .author__urls li .svg-inline--fa,
  .author__urls li .fa,
  .author__urls li .ai{ color: var(--accent); }

  /* ---------- news list (data-driven via _data/news.yml) ---------- */
  .news-list{ margin: 0 0 1.4em; }
  .news-item{ display: flex; gap: .9em; margin: 0 0 .55em; align-items: baseline; }
  .news-item__date{
    flex: 0 0 5.5em; text-align: right;
    font-family: var(--mono); font-size: .7rem; font-weight: 600;
    letter-spacing: .03em; text-transform: uppercase; color: var(--muted);
    white-space: nowrap;
  }
  .news-item__text{ flex: 1; }
  @media screen and (max-width: 600px){
    .news-item{ flex-direction: column; gap: .1em; }
    .news-item__date{ text-align: left; }
  }

  /* ---------- research interests (data-driven via _data/research.yml) ---------- */
  .research-intro{ margin: 0 0 1.25em; }
  .research-list{ display: flex; flex-direction: column; gap: 1em; }
  /* each direction is a soft card, echoing the notice/callout box */
  .research-direction{
    padding: .95em 1.2em;
    background: #f5f2ea;
    border: 1px solid var(--faint);
    border-left: 4px solid var(--accent);
    border-radius: 8px;
  }
  .research-direction .research-direction__title{ font-family: var(--serif); font-weight: 600; font-size: 1.14rem; line-height: 1.3; color: var(--ink); margin: 0 0 .35em; }
  .research-direction .research-direction__body{ margin: 0 0 .6em; line-height: 1.5; color: #46423b; }
  .research-direction .research-direction__body:last-child{ margin-bottom: 0; }
  /* reference links in the prose stay calm (ink + hairline), so the paragraph
     reads as text — the "Our results" chips are the loud, actionable links. */
  .research-direction__body a{ color: var(--ink); text-decoration: none; border-bottom: 1px solid #d8cfbf; }
  .research-direction__body a:hover{ color: var(--accent); border-bottom-color: var(--accent); }
  .research-direction .research-direction__results{ margin: 0; display: flex; flex-wrap: wrap; align-items: center; gap: .4em; }
  .research-direction__results .rd-label{
    font-family: var(--mono); font-size: .64rem; font-weight: 600;
    letter-spacing: .09em; text-transform: uppercase; color: var(--muted); margin-right: .15em;
  }
  .rd-chip{
    font-family: var(--mono); font-size: .72rem; color: var(--accent); background: var(--paper);
    text-decoration: none; border: 1px solid var(--faint); border-radius: 5px;
    padding: .12em .55em; transition: border-color .12s ease, background .12s ease;
  }
  .rd-chip:hover{ border-color: var(--accent); background: #fff; text-decoration: none; }
  /* dark mode */
  html[data-theme="dark"] .research-direction{ background: #211e19; border-color: var(--faint); border-left-color: var(--accent); }
  html[data-theme="dark"] .research-direction__body{ color: #c9c2b5; }
  html[data-theme="dark"] .research-direction__body a{ border-bottom-color: rgba(255,255,255,.2); }
  html[data-theme="dark"] .rd-chip{ background: #2a2620; }
  html[data-theme="dark"] .rd-chip:hover{ background: #322d25; }

  /* ---------- CV page (/cv/) — its own cohesive entry style ---------- */
  .cv-download{
    display: inline-flex; align-items: center; gap: .5em;
    font-family: var(--mono); font-size: .78rem; font-weight: 600; letter-spacing: .02em;
    color: #fff !important; background: var(--accent);
    border: 1px solid var(--accent); border-radius: 6px;
    padding: .5em 1em; text-decoration: none;
    transition: background .12s ease, border-color .12s ease;
  }
  .cv-download:hover{ background: var(--accent-2); border-color: var(--accent-2); color: #fff !important; text-decoration: none; }
  html[data-theme="dark"] .cv-download{ color: #1b1916 !important; }

  /* homepage: subtle section dividers + selected-pub bits */
  .page__content h2.home-section{ border-bottom: 1px solid var(--faint); padding-bottom: .28em; margin-bottom: .85em; }
  /* NB: .page__content p sets margin:1.3em + line-height:1.72 at (0,1,1); these
     rules are scoped under .selpubs to win on specificity and stay compact. */
  .selpubs .cv-entry{ margin-bottom: .5em; }
  .selpubs .cv-entry__title{ margin: 0; line-height: 1.3; }
  .selpubs .cv-entry__sub{ margin: .08em 0 0; line-height: 1.4; }
  .selpubs .cv-entry__highlight{ margin: .12em 0 0; line-height: 1.4; }
  .cv-entry__highlight{ font-size: .9rem; color: var(--accent); }
  .cv-entry__highlight a{ color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  .selpubs .selpub-all{ margin: .5em 0 0; font-family: var(--mono); font-size: .72rem; }
  .selpubs .selpub-all a{ font-family: var(--mono); font-size: .72rem; color: var(--accent); text-decoration: none; }
  .selpubs .selpub-all a:hover{ text-decoration: underline; }

  /* top-level CV section heading + intro note */
  .cv-heading{ font-family: var(--serif); font-weight: 600; font-size: 1.5rem; line-height: 1.2; margin: 1.7em 0 .7em; color: var(--ink); }
  .cv-note{ margin: 0 0 .2em; color: var(--muted); font-size: .95rem; }

  /* section sub-heading (e.g. Conference Papers) */
  .cv-subhead{
    font-family: var(--mono); font-weight: 600; font-size: .7rem;
    text-transform: uppercase; letter-spacing: .12em; color: var(--muted);
    margin: 1.45em 0 .85em;
  }

  /* one entry: content on the left, date/venue right-aligned */
  .cv-entry{ display: flex; justify-content: space-between; align-items: baseline; gap: 1.4em; margin: 0 0 1.05em; }
  .cv-entry__main{ flex: 1; min-width: 0; }
  .cv-entry__title{ font-family: var(--serif); font-weight: 600; font-size: 1.1rem; line-height: 1.3; margin: 0; }
  .cv-entry__title a{ color: var(--ink); text-decoration: none; }
  .cv-entry__title a:hover{ color: var(--accent); }
  .cv-entry__sub{ color: var(--muted); font-size: .97rem; line-height: 1.5; margin: .12em 0 0; }
  .cv-entry__sub strong{ color: var(--ink); font-weight: 700; }
  .cv-entry__sub a{ color: inherit; text-decoration: none; border-bottom: 1px solid rgba(0,0,0,.16); }
  .cv-entry__sub a:hover{ color: var(--accent); border-bottom-color: var(--accent); }
  .cv-entry__meta{ flex: none; text-align: right; font-family: var(--mono); font-size: .72rem; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; color: var(--muted); white-space: nowrap; padding-top: .25em; }
  .cv-entry__links{ margin: .35em 0 0; display: flex; flex-wrap: wrap; gap: .4em; }
  .cv-entry__links a{ font-family: var(--mono); font-size: .71rem; color: var(--accent); text-decoration: none; border: 1px solid var(--faint); border-radius: 5px; padding: .12em .5em; }
  .cv-entry__links a:hover{ border-color: var(--accent); text-decoration: none; }

  /* simple dash list (research interests, service) */
  ul.cv-list{ margin: 0 0 1em; padding: 0; list-style: none; }
  ul.cv-list li{ position: relative; padding-left: 1.1em; margin: 0 0 .42em; line-height: 1.55; }
  ul.cv-list li::before{ content: "–"; position: absolute; left: 0; color: var(--accent); }

  html[data-theme="dark"] .cv-entry__sub a{ border-bottom-color: rgba(255,255,255,.22); }

  @media screen and (max-width: 600px){
    .cv-entry{ flex-direction: column; gap: .1em; }
    .cv-entry__meta{ text-align: left; padding-top: .15em; }
  }

  /* ---------- publication / archive list ---------- */
  .archive__item-title{ font-size: 1.2rem; font-weight: 600; margin-top: .25em; }
  .archive__item-title a{ color: var(--ink); }
  .archive__item-title a:hover{ color: var(--accent); }
  .archive__item-excerpt{ color: #3c3a34; }
  .archive__item-excerpt em, .page__content em{ color: inherit; }

  /* section kickers: "Conference Papers" / "Journal Articles" */
  h2.pub-section{
    font-family: var(--mono);
    font-weight: 600;
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: var(--muted);
    margin: 2.3em 0 .2em;
  }
  h2.pub-section + hr{ border: 0; border-top: 1px solid var(--faint); margin: .45em 0 1.15em; }
  hr{ border: 0; border-top: 1px solid var(--faint); }

  /* "Published in <venue>, year" meta line under each title */
  .archive__item p > i,
  .page__content > p > i:first-child{ font-style: italic; }

  /* ---------- footer ---------- */
  .page__footer{ background: var(--paper); border-top: 1px solid var(--faint); }
  .page__footer, .page__footer a{ color: var(--muted); }
  .page__footer a:hover{ color: var(--accent); }

  /* ============================================================
     Research-topic badges + filter bar  (retuned to warm palette)
     ============================================================ */
  .paper-topics{ margin: .3em 0 .45em; padding: 0; line-height: 1.9; }
  .topic-tag{
    display: inline-block;
    font-family: var(--mono);
    font-size: .66rem; font-weight: 600; letter-spacing: .06em;
    padding: .13em .5em; margin: 0 .3em .16em 0;
    border-radius: 4px; border: 1px solid transparent;
    white-space: nowrap; vertical-align: middle;
    text-decoration: none; cursor: pointer;
    transition: filter .12s ease;
  }
  a.topic-tag:hover, a.topic-tag:focus{ text-decoration: none; filter: brightness(.96); }

  .topic--pc{ background: #efe7f3; color: #6a3b86; border-color: #e0d2ea; }
  .topic--cc{ background: #e7edf5; color: #345f93; border-color: #d4def0; }
  .topic--cr{ background: #e7f0ea; color: #2f6f54; border-color: #d2e6d9; }
  .topic--default{ background: #efece6; color: #6f695f; border-color: #e3ddd2; }

  .topic-filter{
    margin: .4em 0 1.6em; padding: .7em .9em;
    background: #f5f2ea; border: 1px solid var(--faint); border-radius: 8px;
  }
  .topic-filter__label{
    font-family: var(--mono); font-size: .72rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-right: .5em;
  }
  .topic-filter .filter-chip{
    display: inline-block; font-family: var(--mono);
    font-size: .76rem; font-weight: 500;
    padding: .26em .7em; margin: .15em .3em .15em 0;
    border-radius: 999px; border: 1px solid transparent;
    text-decoration: none; cursor: pointer;
    transition: filter .12s ease;
  }
  .topic-filter .filter-chip:hover{ text-decoration: none; filter: brightness(.96); }
  .filter-chip .chip-abbr{ font-weight: 700; margin-right: .4em; opacity: .9; }
  .filter-chip--all{ background: #ece8df; color: #4a463f; border-color: #ded8cc; }
  .topic-filter .filter-chip.is-active{ box-shadow: 0 0 0 2px currentColor inset; filter: brightness(.98); }
  .topic-filter__empty{ color: var(--muted); font-style: italic; margin: .5em 0 1em; }

  /* ============================================================
     PUBLICATION ENTRY  (venue badge + action buttons + citation)
     ============================================================ */
  /* entry vertical rhythm */
  .list__item{ margin-bottom: 2em; }
  .archive__item-title{ margin: 0 0 .28em; line-height: 1.25; }
  .archive__item-excerpt{ margin: 0 0 .55em; line-height: 1.62; }

  /* author line (own name bolded) */
  .pub-authors{ font-family: var(--serif); font-size: 1rem; line-height: 1.4; color: #4a463f; margin: 0 0 .45em; }
  .pub-authors strong{ font-weight: 700; color: var(--ink); }
  .pub-authors a.collab{ color: inherit; text-decoration: none; border-bottom: 1px solid rgba(0, 0, 0, .16); transition: color .12s ease, border-color .12s ease; }
  .pub-authors a.collab:hover{ color: var(--accent); border-bottom-color: var(--accent); }

  .pub-meta{ display: flex; flex-wrap: wrap; align-items: center; gap: .5em; margin: 0 0 .55em; }
  .pub-meta .paper-topics{ margin: 0; }
  .pub-venue{
    font-family: var(--mono);
    font-size: .72rem; font-weight: 600; letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(138, 47, 42, .07);
    border: 1px solid rgba(138, 47, 42, .18);
    padding: .18em .55em; border-radius: 4px; white-space: nowrap;
  }

  .pub-links{ display: flex; flex-wrap: wrap; gap: .5em; margin: .6em 0 .2em; }
  .pub-link{
    display: inline-flex; align-items: center; gap: .42em;
    font-family: var(--mono); font-size: .76rem; font-weight: 500;
    color: var(--ink); background: transparent;
    border: 1px solid var(--faint);
    padding: .32em .72em; border-radius: 6px;
    text-decoration: none;
    transition: border-color .12s ease, color .12s ease, background .12s ease;
  }
  .pub-link:hover{
    text-decoration: none; color: var(--accent);
    border-color: var(--accent); background: rgba(138, 47, 42, .05);
  }
  .pub-link i{ font-size: .92em; opacity: .85; }

  /* ============================================================
     SURVEYS & NOTES page (/surveys/)
     ============================================================ */
  .notes-intro{ color: var(--muted); font-size: 1.02em; margin: .2em 0 1.9em; max-width: 46em; }
  .notes-intro .kind-badge{ vertical-align: middle; }

  .note-topic{ margin: 0 0 2.6em; }
  .note-topic__name{ font-family: var(--serif); font-size: 1.6rem; font-weight: 600; margin: 0 0 .15em; }
  .note-topic__blurb{ color: var(--muted); font-style: italic; margin: 0 0 .7em; max-width: 44em; }
  .note-topic__rule{ border: 0; border-top: 1px solid var(--faint); margin: 0 0 1.35em; }

  .note-item{ margin: 0 0 1.5em; }
  .note-item--mine{
    border-left: 3px solid var(--accent);
    padding: .1em 0 .1em 1em;
    background: linear-gradient(to right, rgba(138, 47, 42, .05), transparent 62%);
    border-radius: 0 6px 6px 0;
  }
  .note-item__tags{ display: flex; flex-wrap: wrap; gap: .4em; margin: 0 0 .32em; }
  .note-item__title{ font-family: var(--serif); font-size: 1.18rem; font-weight: 600; line-height: 1.3; margin: 0 0 .1em; }
  .note-item__title a{ color: var(--ink); text-decoration: none; }
  .note-item__title a:hover{ color: var(--accent); text-decoration: none; }
  .note-item__meta{ font-family: var(--mono); font-size: .8rem; color: var(--muted); margin: 0 0 .4em; }
  .note-item__meta strong{ color: var(--ink); }
  .note-item__note{ font-family: var(--serif); color: #3c3a34; line-height: 1.58; margin: 0; max-width: 46em; }

  /* kind badges */
  .kind-badge{
    display: inline-block; font-family: var(--mono);
    font-size: .64rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
    padding: .15em .55em; border-radius: 4px; border: 1px solid transparent; white-space: nowrap;
  }
  .kind--survey{ background: #e7edf5; color: #345f93; border-color: #d4def0; }
  .kind--textbook{ background: #e7f0ea; color: #2f6f54; border-color: #d2e6d9; }
  .kind--notes, .kind--lecture-notes{ background: #efe7f3; color: #6a3b86; border-color: #e0d2ea; }
  .kind--paper{ background: #f3ece2; color: #8a5a2b; border-color: #e9d6c3; }
  .kind--mine{ background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ============================================================
     DARK MODE — respects the masthead toggle (html[data-theme="dark"]).
     Re-points the editorial palette + the few hardcoded colors so the
     bright/dark switch actually repaints the page.
     ============================================================ */
  html[data-theme="dark"]{
    --paper:  #1b1916;     /* warm near-black            */
    --ink:    #e9e4d9;     /* warm off-white text        */
    --muted:  #a59d90;
    --faint:  #332f28;     /* hairlines                  */
    --accent: #e0897f;     /* lightened oxblood (legible on dark) */
    --accent-2:#f0aaa1;
  }
  html[data-theme="dark"] body{ background: var(--paper); color: var(--ink); }
  html[data-theme="dark"] .archive__item-excerpt{ color: #cdc7bb; }
  html[data-theme="dark"] .archive__item-title a{ color: var(--ink); }

  /* topic badges on dark */
  html[data-theme="dark"] .topic--pc{ background:#2c2336; color:#cdaee4; border-color:#3d3149; }
  html[data-theme="dark"] .topic--cc{ background:#1f2c3b; color:#9cc2ec; border-color:#2c3d50; }
  html[data-theme="dark"] .topic--cr{ background:#1d2f27; color:#92cdab; border-color:#2a4338; }
  html[data-theme="dark"] .topic--default{ background:#2a2620; color:#a59d90; border-color:#3a352c; }

  /* filter bar on dark */
  html[data-theme="dark"] .topic-filter{ background:#211e19; border-color:var(--faint); }
  html[data-theme="dark"] .filter-chip--all{ background:#2c2820; color:#cdc7bb; border-color:#3a352c; }

  /* publication entry on dark */
  html[data-theme="dark"] .pub-authors{ color:#c9c2b5; }
