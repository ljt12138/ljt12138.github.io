# Collaborator homepages — maps a co-author's full name to their website.
#
# Used by _includes/author-line.html to auto-link author names in publication
# entries (and anywhere else that include is used). To add a new collaborator,
# just add one line here — no template changes needed. A name not listed here
# (or with a blank URL) simply renders as plain text.
#
# MAINTENANCE — routinely re-check availability:
#   Academic / personal pages move or go offline over time (link rot). Periodically
#   verify each URL still returns HTTP 200 and still points to the right person, and
#   update or remove any that have rotted. A quick check:
#     while read -r u; do echo "$(curl -s -o /dev/null -w '%{http_code}' "$u")  $u"; done \
#       < <(grep -oE 'https?://[^ ]+' _data/collaborators.yml)
#   Last verified live: 2026-06-28.

