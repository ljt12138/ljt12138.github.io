# Drives the CV page (_pages/cv.md), rendered by _includes/cv.html.
# Same spirit as _data/research.yml and _data/news.yml — edit content here,
# never touch HTML. Conference & journal PUBLICATIONS are pulled automatically
# from the _publications collection; only the manuscripts live in this file.
#
# Each section has a `name` and ONE of:
#   entries:  list of { title, sub, meta } cards (see fields below)
#   bullets:  list of plain Markdown strings (rendered as a dash list)
#   from_publications: true  (special — renders the collection + `manuscripts`)
#
# Entry fields (all optional except title; all support inline Markdown —
# [links](url), **bold**, *italic*, and $$math$$):
#   title    : bold serif heading. Put a [link](url) inside to make it clickable.
#   sub      : muted detail line under the title.
#   authors  : author string (use instead of `sub` for papers) — "Jiatu Li" is
#              auto-bolded and known co-authors auto-link (see _data/collaborators.yml).
#   meta     : right-aligned mono label (date, venue, year).

download_pdf: /files/cv.pdf

